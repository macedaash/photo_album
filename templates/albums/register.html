{% extends 'albums/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto;background:#fff;padding:32px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08)">
  <h2 style="margin-bottom:24px">Create an account</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:14px;margin-bottom:4px">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p style="color:red;font-size:12px">{{ field.errors.0 }}</p>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
  </form>
  <p style="margin-top:16px;font-size:14px;text-align:center">
    Already have an account? <a href="{% url 'login' %}">Login</a>
  </p>
</div>
{% endblock %}
