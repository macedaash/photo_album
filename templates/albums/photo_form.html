{% extends 'albums/base.html' %}
{% block title %}Upload Photo{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto;background:#fff;padding:32px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08)">
  <a href="{% url 'album-detail' album.pk %}" style="font-size:13px;color:#666">← Back to {{ album.title }}</a>
  <h2 style="margin:12px 0 24px">Upload Photo</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
      <div style="margin-bottom:18px">
        <label style="display:block;font-size:14px;font-weight:500;margin-bottom:4px">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p style="color:red;font-size:12px;margin-top:4px">{{ field.errors.0 }}</p>{% endif %}
      </div>
    {% endfor %}
    <div style="display:flex;gap:10px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Upload</button>
      <a href="{% url 'album-detail' album.pk %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
